<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Campus Bites</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;}

body{
margin:0;
font-family:Inter,sans-serif;
background:linear-gradient(rgba(255,255,255,.9), rgba(255,255,255,.9)),
url("https://images.unsplash.com/photo-1540189549336-e6e99c3679fe");
background-size:cover;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.dashboard{
max-width:1000px;
width:100%;
padding:30px;
background:#fff;
border-radius:20px;
box-shadow:0 20px 60px rgba(0,0,0,.15);
}

h1{text-align:center;color:#ff5722;margin-bottom:40px;}

.empty-state{
text-align:center;
padding:60px 20px;
color:#666;
}

.empty-state h3{
color:#ff5722;
font-size:24px;
margin-bottom:10px;
}

.controls{
text-align:center;
margin:20px 0 40px 0;
}

select{
padding:12px 16px;
border-radius:12px;
border:2px solid #e0e0e0;
font-size:16px;
font-weight:600;
min-width:200px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
min-height:300px;
}

.card{
opacity:0;
transform:translateY(30px) scale(0.95);
height:220px;
border-radius:15px;
overflow:hidden;
cursor:pointer;
position:relative;
box-shadow:0 10px 30px rgba(0,0,0,.15);
transition:all 0.4s ease;
display:none;
}

.card.show{
opacity:1;
transform:translateY(0) scale(1);
display:block;
}

.card img{
width:100%;
height:100%;
object-fit:cover;
}

.overlay{
position:absolute;
bottom:0;
width:100%;
padding:16px;
background:linear-gradient(to top, rgba(0,0,0,0.9), transparent);
color:#fff;
font-weight:700;
}

.status{
position:absolute;
top:12px;
right:12px;
padding:6px 12px;
border-radius:12px;
color:#fff;
font-size:13px;
font-weight:600;
}

.open{background:#4caf50;}
.closed{background:#f44336;}

.card.closed{
opacity:0.5;
pointer-events:none;
}
</style>
</head>

<body>

<div class="dashboard">
<h1>Campus Bites</h1>

<div class="controls">
<select id="collegeSelect">
<option value="">🎓 Select Your College</option>
<option value="SRIMT">🏫 SRIMT</option>
</select>
</div>

<div class="empty-state" id="emptyState">
<h3>Choose Your College</h3>
<p>Select your college to view canteens</p>
</div>

<div class="grid" id="grid" style="display:none;">

<div class="card" data-colleges="SRIMT" data-id="nescafe" data-link="https://campusbitesnescafe.vercel.app">
<img src="https://images.unsplash.com/photo-1511920170033-f8396924c348">
<div class="overlay">☕ Nescafe</div>
</div>

<div class="card" data-colleges="SRIMT" data-id="rahul" data-link="https://campusbitessingh-cafe.vercel.app">
<img src="https://images.unsplash.com/photo-1550547660-d9450f859349">
<div class="overlay">🍽️ Singh Cafe</div>
</div>

<div class="card" data-colleges="SRIMT" data-id="foodcourt" data-link="https://campusbitesfoodcourt.vercel.app">
<img src="https://images.unsplash.com/photo-1600891964599-f61ba0e24092">
<div class="overlay">🍕 Food Court</div>
</div>

<div class="card" data-colleges="SRIMT" data-id="onepour" data-link="https://campusbitesone-pour.vercel.app">
<img src="https://images.unsplash.com/photo-1551024709-8f23befc6f87">
<div class="overlay">🍹 One Pour</div>
</div>

</div>
</div>

<script>
const cards = document.querySelectorAll(".card");
const collegeSelect = document.getElementById("collegeSelect");
const grid = document.getElementById("grid");
const emptyState = document.getElementById("emptyState");

// ✅ LOAD STATUS FROM ADMIN PANEL
let kitchenStatus = JSON.parse(localStorage.getItem("kitchenStatus")) || {
  nescafe: true,
  rahul: false,
  foodcourt: true,
  onepour: true
};

// ✅ APPLY STATUS
function applyStatus() {
  cards.forEach(card => {
    const id = card.dataset.id;
    const isOpen = kitchenStatus[id];

    const old = card.querySelector(".status");
    if (old) old.remove();

    const badge = document.createElement("div");
    badge.className = "status";

    // RESET STATE
    card.classList.remove("closed");

    if (isOpen) {
      badge.innerText = "🟢 Open";
      badge.classList.add("open");
    } else {
      badge.innerText = "🔴 Closed";
      badge.classList.add("closed");
      card.classList.add("closed");
    }

    card.appendChild(badge);
  });
}

// ✅ FILTER
function applyCollegeFilter() {
  const college = collegeSelect.value;

  if (!college) {
    grid.style.display = "none";
    emptyState.style.display = "block";
    return;
  }

  emptyState.style.display = "none";
  grid.style.display = "grid";

  cards.forEach(card => card.classList.remove("show"));

  const match = Array.from(cards).filter(c =>
    c.dataset.colleges.includes(college)
  );

  match.forEach((card, i) => {
    setTimeout(() => card.classList.add("show"), i * 120);
  });
}

collegeSelect.addEventListener("change", applyCollegeFilter);

// ✅ CLICK
cards.forEach(card => {
  card.addEventListener("click", () => {
    if (card.classList.contains("closed")) {
      alert("Kitchen is closed ❌");
      return;
    }
    window.location.href = card.dataset.link;
  });
});

// ✅ AUTO SYNC WITH ADMIN PANEL
window.addEventListener("storage", () => {
  const updated = JSON.parse(localStorage.getItem("kitchenStatus"));
  if (updated) {
    kitchenStatus = updated;
    applyStatus();
  }
});

// INIT
applyStatus();
emptyState.style.display = "block";
grid.style.display = "none";
</script>

</body>
</html>
